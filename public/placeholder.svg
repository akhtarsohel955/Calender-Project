<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar Icon -->
  <rect x="40" y="50" width="120" height="120" rx="8" fill="#3B82F6" stroke="#1E40AF" stroke-width="3"/>
  
  <!-- Calendar Header -->
  <rect x="40" y="50" width="120" height="30" rx="8" fill="#1E40AF"/>
  <rect x="40" y="65" width="120" height="15" fill="#1E40AF"/>
  
  <!-- Binding Rings -->
  <circle cx="70" cy="50" r="6" fill="none" stroke="#1E40AF" stroke-width="3"/>
  <circle cx="100" cy="50" r="6" fill="none" stroke="#1E40AF" stroke-width="3"/>
  <circle cx="130" cy="50" r="6" fill="none" stroke="#1E40AF" stroke-width="3"/>
  
  <!-- Calendar Grid -->
  <line x1="60" y1="95" x2="140" y2="95" stroke="#DBEAFE" stroke-width="2"/>
  <line x1="60" y1="115" x2="140" y2="115" stroke="#DBEAFE" stroke-width="2"/>
  <line x1="60" y1="135" x2="140" y2="135" stroke="#DBEAFE" stroke-width="2"/>
  
  <line x1="70" y1="85" x2="70" y2="160" stroke="#DBEAFE" stroke-width="2"/>
  <line x1="90" y1="85" x2="90" y2="160" stroke="#DBEAFE" stroke-width="2"/>
  <line x1="110" y1="85" x2="110" y2="160" stroke="#DBEAFE" stroke-width="2"/>
  <line x1="130" y1="85" x2="130" y2="160" stroke="#DBEAFE" stroke-width="2"/>
  
  <!-- Highlighted Date -->
  <circle cx="100" cy="125" r="8" fill="#EF4444"/>
  
  <!-- Small dots for dates -->
  <circle cx="65" cy="90" r="2" fill="#FFFFFF"/>
  <circle cx="80" cy="90" r="2" fill="#FFFFFF"/>
  <circle cx="100" cy="90" r="2" fill="#FFFFFF"/>
  <circle cx="120" cy="90" r="2" fill="#FFFFFF"/>
  <circle cx="135" cy="90" r="2" fill="#FFFFFF"/>
</svg>
